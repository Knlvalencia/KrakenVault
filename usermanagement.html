<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraken Vault | User Management</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="users.css">
    <script src="main.js"></script>
</head>
<body>
    <header class="kraken-header">
        <div class="nav-group">
            <button class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <img src="logo.png" alt="logo" class="logo">
            <nav class="nav-menu">
                <a href="DocumentArchive.html">Document Archive</a>
                <a href="ActivityLog.html">Activity Log</a>
                <a href="UserManagement.html" class="active">User Management</a>
            </nav>
        </div>
        <a href="UserProfile.html" class="profile-area">
            <img src="pfp.png" alt="Profile" class="profile-icon">
        </a>
    </header>

    <main class="users-content">
        <div class="users-header-controls">
            <h1>User Management</h1>
            <div class="user-search-group">
                <button class="action-button sort-btn">
                    <span class="sort-icon">⇅</span> Sort
                </button>
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input with-icon" placeholder="Search by username or id">
                </div>
            </div>
        </div>

        <table class="file-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Term Year</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th style="width: 100px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Name">Lim Edard Arelo</td>
                    <td data-label="Term Year">2024-2025</td>
                    <td data-label="Roles">Admin</td>
                    <td data-label="Status"><span class="status-inactive">Inactive</span></td>
                    <td class="actions-cell" data-label="Actions">
                        <button class="action-button">•••</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="bottom-bar">
            <div class="display-controls">
                <span>Showing</span>
                <select class="row-select">
                    <option value="9">9</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
                <span>members of 50</span>
            </div>
            <div class="pagination-controls">
                <button class="page-btn">&lt;</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">&gt;</button>
            </div>
            <button class="action-button new-officer-btn">+ Add New Officer</button>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraken Vault | User Management</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="users.css">
    <script src="main.js"></script>
</head>
<body>
    <!-- HEADER START -->
    <header class="kraken-header">
        <div class="nav-group">
            <button class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <img src="logo.png" alt="logo" class="logo">
            <nav class="nav-menu">
                <a href="DocumentArchive.html">Document Archive</a>
                <a href="ActivityLog.html">Activity Log</a>
                <a href="UserManagement.html" class="active">User Management</a>
            </nav>
        </div>
        <a href="UserProfile.html" class="profile-area">
            <img src="pfp.png" alt="Profile" class="profile-icon">
        </a>
    </header>
    <!-- HEADER END -->

    <!-- START MODAL -->
    <div id="addOfficerModal" class="modal-overlay">
        <div class="modal-content wide-modal">
            <div class="modal-header">
                <h2>Add New Officer</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="addOfficerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="officerFirstName" placeholder="First name..." required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="officerLastName" placeholder="Last name..." required>
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="officerAge" placeholder="Age..." required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" id="officerContact" placeholder="Contact number..." required>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <input type="text" id="officerCourse" placeholder="e.g., BSIT-IS..." required>
                    </div>
                    <div class="form-group">
                        <label>Year Level</label>
                        <select id="officerYearLevel" required>
                            <option value="" disabled selected>Select Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Position</label>
                        <select id="officerPosition" required>
                            <option value="" disabled selected>Select Position</option>
                            <option value="PLACEHOLDER 1">PLACEHOLDER 1</option>
                            <option value="PLACEHOLDER 2">PLACEHOLDER 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Term Year</label>
                        <input type="text" id="officerTermYear" placeholder="e.g., 2025-2026" required>
                    </div>
                    <div class="form-group">
                        <label>Date Assumed</label>
                        <input type="date" id="officerDateAssumed" required>
                    </div>
                    <div class="form-group">
                        <label>Access Level</label>
                        <select id="officerAccessLevel" required>
                            <option value="" disabled selected>Select Access Level</option>
                            <option value="Admin">Admin</option>
                            <option value="Editor">Editor</option>
                            <option value="Viewer">Viewer</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-delete close-modal">Cancel</button>
                    <button type="submit" class="btn-upload">Add Officer</button>
                </div>
            </form>
        </div>
    </div>
    <!-- END MODAL -->

    <!-- TITLE AREA START -->
    <main class="users-content">
        <div class="users-header-controls">
            <h1>User Management</h1>
            <div class="user-search-group">
                <button class="action-button sort-btn">
                    <span class="sort-icon">⇅</span> Sort
                </button>
                <div class="search-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input with-icon" placeholder="Search by username or id">
                </div>
            </div>
        </div>
        <!-- TITLE AREA END -->

        <!-- MAIN TABLE START -->
        <table class="file-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Term Year</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th style="width: 100px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Name">Lim Edard Arelo</td>
                    <td data-label="Term Year">2024-2025</td>
                    <td data-label="Roles">Admin</td>
                    <td data-label="Status"><span class="status-inactive">Inactive</span></td>
                    <td class="actions-cell" data-label="Actions">
                        <button class="action-button">•••</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <!-- MAIN TABLE END -->

        <!-- CONTROL BAR START -->
        <div class="bottom-bar">
            <div class="display-controls">
                <span>Showing</span>
                <select class="row-select">
                    <option value="9">9</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
                <span>members of 50</span>
            </div>
            <div class="pagination-controls">
                <button class="page-btn">&lt;</button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">&gt;</button>
            </div>
            <button class="action-button new-officer-btn">+ Add New Officer</button>
        </div>
        <!-- CONTROL BAR END -->
    </main>
</body>
</html>
